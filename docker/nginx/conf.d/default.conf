server {
    listen 80;
    server_name _;

    # Limit file uploads to 100M
    client_max_body_size 100M;

    root /var/www/public;
    index index.php;

    # Backend API & all routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Backend storage uploads (e.g., product images)
    location /storage/ {
        try_files $uri =404;
    }

    # Backend direct uploads (e.g., user avatars)
    location /uploads/ {
        try_files $uri =404;
    }

    # Pass PHP scripts to FastCGI server (Laravel backend)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }
}
